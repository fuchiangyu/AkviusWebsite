<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="A small website for looking up Chagatai words." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="categories">
    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="../index.html" aria-label="Akvius home">
          <span class="brand-mark"><img src="../imgs/avatar.png" alt="" /></span>
          <span>Akvius</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links">
          <a href="../index.html" data-page="home">Home</a>
          <a href="categories.html" data-page="categories">Categories</a>
          <a href="timeline.html" data-page="timeline">Timeline</a>
          <a href="about.html" data-page="about">About</a>
        </div>
        <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
          <span class="theme-toggle-sun">&#9728;</span>
          <span class="theme-toggle-moon">&#9790;</span>
        </button>
      </nav>
    </header>
    <main class="page-main">
      <article class="section page-section dictionary-tool-page">
        <div class="section-heading dictionary-tool-heading">
          <nav class="page-trail" aria-label="Breadcrumb">
            <a href="categories.html">Categories</a>
            <a href="category-tools.html">Tools</a>
            <span>Chagatai Dictionary</span>
          </nav>
        </div>
        <div class="dictionary-frame-panel">
          <iframe
            id="dictionaryFrame"
            title="Chagatai Dictionary"
            src="dictionary-app/index.html?v=20260529h"
            loading="eager"
            scrolling="no"
          ></iframe>
        </div>
      </article>
    </main>
    <footer class="site-footer"><p>&copy; 2026 Akvius. Stay curious. Keep passions.</p></footer>
    <script>
      const dictionaryFrame = document.querySelector("#dictionaryFrame");

      function postDictionaryTheme() {
        const theme = document.documentElement.dataset.theme || "light";
        dictionaryFrame?.contentWindow?.postMessage({ type: "dictionary-theme", theme }, "*");
      }

      dictionaryFrame?.addEventListener("load", () => {
        postDictionaryTheme();
        dictionaryFrame.contentWindow?.postMessage({ type: "request-dictionary-height" }, "*");
      });

      window.addEventListener("message", (event) => {
        if (event.source !== dictionaryFrame?.contentWindow) return;
        if (event.data?.type !== "dictionary-height") return;
        const height = Number(event.data.height);
        if (!Number.isFinite(height)) return;
        dictionaryFrame.style.height = `${Math.ceil(height + 24)}px`;
      });

      const themeObserver = new MutationObserver(postDictionaryTheme);
      themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
    </script>
    <script src="../script.js"></script>
  </body>
</html>
