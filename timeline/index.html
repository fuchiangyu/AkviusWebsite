<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline | Akvius</title>
    <meta name="description" content="Timeline for Akvius personal website." />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="timeline">
    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <button class="brand" type="button" aria-label="Open navigation" aria-expanded="false"><span class="brand-mark"><img src="../assets/img/avatar.png" alt="" /></span><span>Akvius</span></button>
        <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links">
          <a href="../index.html" data-page="home">Home</a>
          <a href="../categories/index.html" data-page="categories">Categories</a>
          <a href="../stats/index.html" data-page="stats">Stats</a>
          <a href="index.html" data-page="timeline">Timeline</a>
        </div>
        <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
          <span class="theme-toggle-sun">&#9728;</span>
          <span class="theme-toggle-moon">&#9790;</span>
        </button>
      </nav>
    </header>

    <main class="page-main">
      <section class="section page-section timeline-section">
        <div class="curved-timeline" aria-label="Article publishing timeline">
          <div class="timeline-intro">
            <p class="eyebrow" data-text-key="timelineEyebrow">Timeline</p>
            <h1 class="page-title" data-text-key="timelineTitle">Site Timeline</h1>
            <p>A chronological stream of posts, version notes, and updates.</p>
            <div class="timeline-updates" aria-label="Latest updated posts">
              <span data-text-key="newUpdates">New updates</span>
              <div class="timeline-update-list" data-timeline-updates></div>
            </div>
          </div>

          <div class="timeline-track" data-timeline-track aria-live="polite">
            <svg class="timeline-path" viewBox="0 0 640 240" aria-hidden="true" preserveAspectRatio="none">
              <path d="M320 30 C330 86 306 132 320 210" />
            </svg>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Akvius. Stay curious. Keep passions.</p>
    </footer>

    <script src="../assets/js/site-data.js"></script>
    <script src="../assets/js/site-config.js"></script>
    <script src="../assets/js/site-stats.js"></script>
    <script src="../assets/js/site-translations.js"></script>
    <script src="../assets/js/translations/zh-hant-map.js"></script>
    <script src="../assets/js/translations/ug-transliteration.js"></script>
    <script src="../assets/js/translations/common.js"></script>
    <script src="../assets/js/translations/posts/chaghatay-dictionary.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
