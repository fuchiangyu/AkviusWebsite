        if (event.data?.type !== "uyghur-vocabulary-trainer:resize") return;
        const frame = document.querySelector(".vocab-frame-panel iframe");
        const contentHeight = Number(event.data.height);
        if (!frame || !Number.isFinite(contentHeight)) return;
        const height = Math.max(320, Math.min(contentHeight + 2, 900));
        frame.style.height = `${height}px`;
      });
